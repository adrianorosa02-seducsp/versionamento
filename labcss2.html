<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Visual Lab Advanced</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f0f0f0;
    padding:20px;
}

.container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.panel{
    width:380px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    max-height:90vh;
    overflow:auto;
}

.panel label{
    display:block;
    margin-top:10px;
    font-size:13px;
}

.panel input,
.panel select{
    width:100%;
    padding:8px;
    margin-top:4px;
}

.preview-wrapper{
    flex:1;
    min-width:600px;
}

.device-bar{
    margin-bottom:10px;
}

.preview{
    background:white;
    border:2px dashed #999;
    height:700px;
    position:relative;
    overflow:auto;
    padding:20px;
    transition:all 0.3s ease;
}

#box{
    width:200px;
    height:100px;
    background:#4CAF50;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:all .3s ease;
}

.code{
    margin-top:15px;
    background:#111;
    color:#0f0;
    padding:15px;
    font-family:monospace;
    white-space:pre-wrap;
    border-radius:8px;
}
</style>
</head>
<body>

<h2>🎯 CSS Visual Lab Advanced</h2>

<div class="container">

<div class="panel">

<label>Display</label>
<select id="display">
<option>flex</option>
<option>block</option>
<option>grid</option>
<option>inline-block</option>
</select>

<label>Position</label>
<select id="position">
<option>relative</option>
<option>absolute</option>
<option>fixed</option>
<option>sticky</option>
</select>

<label>Width</label>
<input id="width" value="200px">

<label>Height</label>
<input id="height" value="100px">

<label>Margin</label>
<input id="margin" value="10px">

<label>Padding</label>
<input id="padding" value="10px">

<label>Top</label>
<input id="top" value="0px">

<label>Left</label>
<input id="left" value="0px">

<label>Border Radius</label>
<input id="radius" value="10px">

<label>Border</label>
<input id="border" value="2px solid black">

<label>Box Shadow</label>
<input id="shadow" value="5px 5px 10px rgba(0,0,0,0.3)">

<label>Background</label>
<input id="bg" value="#4CAF50">

<label>Text Color</label>
<input id="color" value="#ffffff">

<label>Font Size</label>
<input id="fontsize" value="16px">

<label>Rotate</label>
<input id="rotate" value="0deg">

<label>Scale</label>
<input id="scale" value="1">

<label>Opacity</label>
<input id="opacity" value="1">

<label>Overflow</label>
<select id="overflow">
<option>visible</option>
<option>hidden</option>
<option>scroll</option>
<option>auto</option>
</select>

<label>Justify Content</label>
<select id="justify">
<option>center</option>
<option>flex-start</option>
<option>flex-end</option>
<option>space-between</option>
<option>space-around</option>
</select>

<label>Align Items</label>
<select id="align">
<option>center</option>
<option>flex-start</option>
<option>flex-end</option>
<option>stretch</option>
</select>

<button onclick="applyCSS()" style="margin-top:15px;width:100%;padding:10px;">
Aplicar CSS
</button>

</div>

<div class="preview-wrapper">

<div class="device-bar">
<button onclick="setDevice('desktop')">Desktop</button>
<button onclick="setDevice('tablet')">Tablet</button>
<button onclick="setDevice('mobile')">Mobile</button>
</div>

<div class="preview" id="preview">
    <div id="box">Elemento CSS</div>
</div>

<div class="code" id="csscode"></div>

</div>

</div>

<script>

function applyCSS(){
    const box = document.getElementById('box');

    box.style.display = display.value;
    box.style.position = position.value;
    box.style.width = width.value;
    box.style.height = height.value;
    box.style.margin = margin.value;
    box.style.padding = padding.value;
    box.style.top = top.value;
    box.style.left = left.value;
    box.style.borderRadius = radius.value;
    box.style.border = border.value;
    box.style.boxShadow = shadow.value;
    box.style.background = bg.value;
    box.style.color = color.value;
    box.style.fontSize = fontsize.value;
    box.style.transform = `rotate(${rotate.value}) scale(${scale.value})`;
    box.style.opacity = opacity.value;
    box.style.overflow = overflow.value;
    box.style.justifyContent = justify.value;
    box.style.alignItems = align.value;

    gerarCSS();
}

function gerarCSS(){
    const css = `
#box{
 display:${display.value};
 position:${position.value};
 width:${width.value};
 height:${height.value};
 margin:${margin.value};
 padding:${padding.value};
 top:${top.value};
 left:${left.value};
 border-radius:${radius.value};
 border:${border.value};
 box-shadow:${shadow.value};
 background:${bg.value};
 color:${color.value};
 font-size:${fontsize.value};
 transform:rotate(${rotate.value}) scale(${scale.value});
 opacity:${opacity.value};
 overflow:${overflow.value};
 justify-content:${justify.value};
 align-items:${align.value};
}
`;
    document.getElementById('csscode').textContent = css;
}

function setDevice(type){
    const preview = document.getElementById('preview');

    if(type==='desktop'){
        preview.style.width='100%';
    }

    if(type==='tablet'){
        preview.style.width='768px';
    }

    if(type==='mobile'){
        preview.style.width='375px';
    }
}

gerarCSS();

</script>

</body>
</html>
